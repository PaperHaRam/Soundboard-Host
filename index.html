<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Soundboard – 호스트 (Enhanced)</title>
<style>
  :root {
    --bg:#0d1117; --surface:#0f141b; --card:#121826; --line:#1f2a3a;
    --muted:#9fb0c9; --text:#ecf2ff; --accent:#6ee7b7; --accent-2:#60a5fa; --warn:#fca5a5;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,sans-serif;}
  header{position:sticky;top:0;z-index:5;backdrop-filter:blur(8px);background:linear-gradient(180deg,rgba(13,17,23,.95),rgba(13,17,23,.75));
    border-bottom:1px solid var(--line);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
  h1{margin:0;font-size:18px;font-weight:800;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12px}
  .pill{padding:6px 10px;border-radius:999px;background:#0b1220;border:1px solid var(--line);font-size:12px;color:#c7d5f3}
  .pill-accent{border-color:var(--accent);color:var(--accent)}
  .btn{background:#182235;border:1px solid #26344d;border-radius:10px;color:var(--text);padding:9px 12px;cursor:pointer;font-weight:700;transition:0.2s}
  .btn:hover{border-color:#33507a;background:#1e2a41}
  .btn-ghost{background:transparent;border:1px dashed #33425c;color:#cfe0ff}
  .btn-accent{background:linear-gradient(90deg,#10b981,#34d399);border:0;color:#062013}
  .btn-blue{background:linear-gradient(90deg,#3b82f6,#60a5fa);border:0;color:#06152b}
  .btn-danger{background:linear-gradient(90deg,#f43f5e,#fb7185);border:0;color:#2a0107}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:10px}
  main{padding:18px;display:grid;grid-template-columns:2.1fr 1fr;gap:18px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
  .panel h2{margin:0 0 10px 0;font-size:15px}
  .divider{height:1px;background:var(--line);margin:10px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column}
  .card-head{padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:center}
  .title{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-size:11px;color:#b6c5e3}
  .badge.playing{color:#0affcf}
  .card-body{padding:10px;display:flex;flex-direction:column;gap:10px}
  .controls{display:flex;gap:8px;flex-wrap:wrap}
  .kv{display:flex;align-items:center;gap:8px}
  .range{width:100%}
  .small{font-size:12px;color:var(--muted)}
  .hotbar{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}
  .slot{background:#0f1624;border:1px dashed #334469;border-radius:12px;min-height:84px;padding:8px;display:flex;flex-direction:column;gap:6px;justify-content:center;align-items:center}
  .slot .k{font-size:12px;color:#a3b6da}
  .slot .name{font-weight:700;font-size:12px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
  .slot.drag-over{outline:2px dashed #60a5fa; outline-offset:2px}
  .foot{position:fixed;left:16px;bottom:16px;display:flex;gap:10px;align-items:center}
  .codebox{background:#0b111b;border:1px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;gap:10px;align-items:center}
  .code{font-weight:900;font-size:16px;letter-spacing:1px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}
  input[type="file"]::-webkit-file-upload-button{visibility:hidden}
  input[type="file"]{color:#9fb0c9}
  .section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .prog-wrap{display:flex;flex-direction:column;gap:6px}
  .prog-row{display:flex;justify-content:space-between;align-items:center}
  .time{font-size:12px;color:#c9d6f5}
  input[type="range"].seek{width:100%}
  .np-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:10px;background:#0f1624}
  
  /* 신규 추가 스타일 */
  .config-bar { background:rgba(110, 231, 183, 0.05); border:1px solid #1f2a3a; padding:12px; border-radius:12px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
  .key-input { background:#0b1220; border:1px solid var(--line); color:var(--accent); font-weight:bold; text-align:center; cursor:pointer; width:120px; border-radius:8px; padding:6px; }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>사운드보드 (호스트)</h1>
    <span class="sub">매핑/내보내기/불러오기 지원</span>
  </div>
  <div class="row">
    <button id="unlockAudio" class="btn">🔊 소리 켜기</button>
    <label class="btn">
      파일 업로드
      <input id="fileInput" type="file" accept="audio/*" multiple style="display:none" />
    </label>
  </div>
</header>

<main>
  <section class="panel">
    <div class="config-bar">
      <div class="row">
        <span class="pill">전체 정지 단축키</span>
        <input type="text" id="stopKeyInput" class="key-input" value="Space" readonly title="클릭하여 키 변경" />
      </div>
      <div class="row">
        <button id="exportBtn" class="btn btn-ghost">⚙️ 설정 내보내기</button>
        <button id="importBtn" class="btn btn-ghost">📂 설정 불러오기</button>
        <input id="configInput" type="file" accept=".json" style="display:none" />
      </div>
    </div>

    <div class="section-head">
      <h2>메인 사운드보드</h2>
      <div class="row">
        <button id="stopMain" class="btn btn-danger">메인 전체 정지</button>
      </div>
    </div>

    <div class="row" style="margin:6px 0 12px 0">
      <div class="kv">
        <span class="pill">보드 마스터 볼륨</span>
        <input id="masterVol" type="range" min="0" max="1" step="0.01" value="0.9" />
        <span id="masterVolVal" class="small">0.90</span>
      </div>
    </div>

    <div id="mainGrid" class="grid"></div>
  </section>

  <aside class="panel">
    <div class="section-head">
      <h2>미니 사운드보드</h2>
      <div class="row">
        <button id="stopMini" class="btn btn-danger">미니 전체 정지</button>
      </div>
    </div>

    <div class="row" style="margin:6px 0 12px 0">
      <div class="kv">
        <span class="pill">미니보드 마스터 볼륨</span>
        <input id="miniMasterVol" type="range" min="0" max="1" step="0.01" value="0.9" />
        <span id="miniMasterVolVal" class="small">0.90</span>
      </div>
    </div>

    <div id="miniGrid" class="hotbar"></div>
    <div class="divider"></div>
    <div class="small">
      • 슬롯 <b>드래그&드롭</b>으로 순서 변경.<br/>
      • 미니보드 할당 시 숫자 키 <b>1~0</b> 재생.<br/>
      • 설정된 <b>전체 정지 단축키</b>로 모든 소리 중지.
    </div>
    <div class="divider"></div>
    <h2 style="margin:0 0 8px 0;font-size:15px">지금 재생 중</h2>
    <div id="nowPlaying"></div>
  </aside>
</main>

<div class="foot">
  <button id="makeCode" class="btn btn-accent">공유 코드 생성</button>
  <div class="codebox">
    <span class="small">공유 코드</span>
    <span id="shareCode" class="code mono">—</span>
  </div>
  <span id="peerStatus" class="small">대기 중…</span>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
/** ========= 초기 설정 및 오디오 컨텍스트 ========= **/
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const mainMasterGain = audioCtx.createGain();
const miniMasterGain = audioCtx.createGain();
const overallMaster = audioCtx.createGain();
const shareDest = audioCtx.createMediaStreamDestination();

mainMasterGain.gain.value = 0.9;
miniMasterGain.gain.value = 0.9;
overallMaster.gain.value = 1.0;

mainMasterGain.connect(overallMaster);
miniMasterGain.connect(overallMaster);
overallMaster.connect(audioCtx.destination);
overallMaster.connect(shareDest);

const state = {
  clips: [],
  miniSlots: Array(10).fill(null),
  stopKey: " ", // 기본값 Space
  peer: null, connectedPeers: new Set(), code: null, rafId: null,
  pendingConfig: null // 불러오기 시 임시 저장할 설정 정보
};

const unlockBtn = document.getElementById('unlockAudio');
const fileInput = document.getElementById('fileInput');
const mainGrid = document.getElementById('mainGrid');
const miniGrid = document.getElementById('miniGrid');
const nowPlayingEl = document.getElementById('nowPlaying');
const masterVol = document.getElementById('masterVol');
const masterVolVal = document.getElementById('masterVolVal');
const miniMasterVol = document.getElementById('miniMasterVol');
const miniMasterVolVal = document.getElementById('miniMasterVolVal');
const stopKeyInput = document.getElementById('stopKeyInput');
const configInput = document.getElementById('configInput');

/** ========= 유틸리티 ========= **/
function fmtTime(sec){ if (!isFinite(sec)||sec<0) return '00:00'; const m=Math.floor(sec/60), s=Math.floor(sec%60); return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function mkSmall(t){ const s=document.createElement('span'); s.className='small'; s.textContent=t; return s; }

async function safePlay(audioEl){
  if (audioCtx.state !== 'running') await audioCtx.resume();
  try { await audioEl.play(); } catch (err){ alert('상단의 "소리 켜기" 버튼을 눌러주세요.'); }
}

/** ========= 단축키 관리 ========= **/
stopKeyInput.onclick = () => {
  stopKeyInput.value = "...키 입력 중...";
  const onKey = (e) => {
    e.preventDefault();
    if (e.code.startsWith('Digit')) {
      alert("숫자 키(1~0)는 미니보드용이므로 지정할 수 없습니다.");
    } else {
      state.stopKey = e.key;
      stopKeyInput.value = e.key === " " ? "Space" : e.key;
    }
    window.removeEventListener('keydown', onKey, true);
  };
  window.addEventListener('keydown', onKey, true);
};

window.addEventListener('keydown', async (e) => {
  // 1. 전체 정지 체크
  if (e.key === state.stopKey) {
    state.clips.forEach(c => c.audioEl.pause());
    return;
  }
  // 2. 미니보드 숫자키 체크
  const map={'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6,'8':7,'9':8,'0':9};
  if (e.key in map) {
    const idx = map[e.key], slot = state.miniSlots[idx];
    if (!slot) return;
    const clip = state.clips.find(c => c.id === slot.clipId);
    if (!clip) return;
    routeClip(clip, 'mini', clip.ui.badge);
    clip.audioEl.currentTime = 0;
    await safePlay(clip.audioEl);
  }
});

/** ========= 설정 내보내기/불러오기 ========= **/
document.getElementById('exportBtn').onclick = () => {
  const data = {
    stopKey: state.stopKey,
    masterVol: masterVol.value,
    miniMasterVol: miniMasterVol.value,
    miniSlots: state.miniSlots.map(s => s ? { name: s.name } : null), // ID대신 이름 저장
    clipsConfig: state.clips.map(c => ({
      name: c.name,
      loop: c.loop,
      vol: c.gainNode.gain.value,
      route: c.route
    }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `soundboard_config.json`; a.click();
};

document.getElementById('importBtn').onclick = () => configInput.click();

configInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const config = JSON.parse(ev.target.result);
      state.pendingConfig = config;
      // 기본 UI 복구
      state.stopKey = config.stopKey || " ";
      stopKeyInput.value = state.stopKey === " " ? "Space" : state.stopKey;
      masterVol.value = config.masterVol || 0.9;
      miniMasterVol.value = config.miniMasterVol || 0.9;
      mainMasterGain.gain.value = masterVol.value;
      miniMasterGain.gain.value = miniMasterVol.value;
      
      alert("설정을 읽었습니다. 이제 해당되는 오디오 파일들을 한꺼번에 업로드해 주세요.");
    } catch(err) { alert("잘못된 설정 파일입니다."); }
  };
  reader.readAsText(file);
};

/** ========= 파일 처리 및 카드 생성 ========= **/
fileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  for (const file of files) {
    const url = URL.createObjectURL(file);
    const audioEl = new Audio(url);
    audioEl.preload = 'auto'; audioEl.loop = true;

    const srcNode = audioCtx.createMediaElementSource(audioEl);
    const gainNode = audioCtx.createGain();
    
    // 기본 클립 생성
    const clip = { 
      id: crypto.randomUUID(), name: file.name, audioEl, srcNode, gainNode, 
      loop: true, route: 'main', slot: null, ui: {} 
    };

    // 설정 불러오기 데이터가 있다면 매칭
    if (state.pendingConfig) {
      const cnf = state.pendingConfig.clipsConfig.find(x => x.name === file.name);
      if (cnf) {
        clip.loop = cnf.loop;
        clip.audioEl.loop = cnf.loop;
        clip.gainNode.gain.value = cnf.vol;
        clip.route = cnf.route || 'main';
      }
      // 미니슬롯 매칭
      state.pendingConfig.miniSlots.forEach((ms, idx) => {
        if (ms && ms.name === file.name) {
          state.miniSlots[idx] = { clipId: clip.id, name: clip.name };
          clip.slot = idx;
        }
      });
    }

    // 연결
    if (clip.route === 'mini') srcNode.connect(gainNode).connect(miniMasterGain);
    else srcNode.connect(gainNode).connect(mainMasterGain);

    state.clips.push(clip);
    addClipCard(clip); 
    hookClipEvents(clip);
  }
  renderMiniGrid();
  fileInput.value = '';
  ensureRAF();
});

function addClipCard(clip){
  const card = document.createElement('div'); card.className='card'; card.id=`clip-${clip.id}`;
  const head = document.createElement('div'); head.className='card-head';
  const title = document.createElement('div'); title.className='title'; title.textContent=clip.name;
  const badge = document.createElement('div'); badge.className='badge'; badge.textContent= (clip.route==='mini'?'미니':'메인')+' 출력';
  head.appendChild(title); head.appendChild(badge);

  const body = document.createElement('div'); body.className='card-body';
  const progWrap = document.createElement('div'); progWrap.className='prog-wrap';
  const progRow = document.createElement('div'); progRow.className='prog-row';
  const curT = document.createElement('span'); curT.className='time'; curT.textContent='00:00';
  const durT = document.createElement('span'); durT.className='time'; durT.textContent='--:--';
  const seek = document.createElement('input'); seek.type='range'; seek.className='seek'; seek.min='0'; seek.max='1'; seek.step='0.001'; seek.value='0';
  seek.oninput = ()=> { if (clip.audioEl.duration) clip.audioEl.currentTime = seek.value * clip.audioEl.duration; };
  progRow.appendChild(curT); progRow.appendChild(durT); progWrap.appendChild(seek); progWrap.appendChild(progRow);

  const ctrlRow = document.createElement('div'); ctrlRow.className='controls';
  const playBtn = document.createElement('button'); playBtn.className='btn btn-blue'; playBtn.textContent='재생';
  const pauseBtn = document.createElement('button'); pauseBtn.className='btn'; pauseBtn.textContent='일시정지';
  const delBtn = document.createElement('button'); delBtn.className='btn btn-danger'; delBtn.textContent='삭제';
  
  playBtn.onclick = async ()=>{ routeClip(clip, clip.route, badge); clip.audioEl.currentTime=0; await safePlay(clip.audioEl); };
  pauseBtn.onclick = ()=> clip.audioEl.pause();
  delBtn.onclick = ()=> deleteClip(clip);
  ctrlRow.appendChild(playBtn); ctrlRow.appendChild(pauseBtn); ctrlRow.appendChild(delBtn);

  const loopRow = document.createElement('div'); loopRow.className='controls';
  const loopBtn = document.createElement('button'); loopBtn.className='btn';
  const updateLoopLabel = ()=> loopBtn.textContent = '반복: ' + (clip.loop ? 'ON' : 'OFF');
  updateLoopLabel();
  loopBtn.onclick = ()=>{ clip.loop=!clip.loop; clip.audioEl.loop=clip.loop; updateLoopLabel(); };
  loopRow.appendChild(loopBtn);

  const volRow = document.createElement('div'); volRow.className='kv';
  const vol = document.createElement('input'); vol.type='range'; vol.min='0'; vol.max='1'; vol.step='0.01'; vol.value=clip.gainNode.gain.value; vol.className='range';
  vol.oninput = ()=> { clip.gainNode.gain.value = vol.value; };
  volRow.appendChild(mkSmall('볼륨')); volRow.appendChild(vol);

  const assignRow = document.createElement('div'); assignRow.className='controls';
  const sel = document.createElement('select'); sel.className='btn';
  ['1','2','3','4','5','6','7','8','9','0'].forEach((k,i)=> { const o=document.createElement('option'); o.value=i; o.textContent=`키 ${k}`; sel.appendChild(o); });
  const abtn = document.createElement('button'); abtn.className='btn'; abtn.textContent='미니 할당';
  abtn.onclick = ()=>{ 
    const idx=parseInt(sel.value,10); 
    state.miniSlots[idx]={clipId:clip.id, name:clip.name}; 
    clip.slot=idx; 
    renderMiniGrid(); 
  };
  assignRow.appendChild(sel); assignRow.appendChild(abtn);

  body.append(progWrap, ctrlRow, loopRow, volRow, assignRow);
  card.append(head, body); mainGrid.appendChild(card);
  clip.ui = { card, badge, curT, durT, seek };
}

/** ========= 미니보드 렌더링 & 드래그 ========= **/
function renderMiniGrid() {
  miniGrid.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','0'];
  state.miniSlots.forEach((payload, i) => {
    const slot = document.createElement('div'); slot.className = 'slot'; slot.dataset.index = i;
    slot.ondragover = (e)=> { e.preventDefault(); slot.classList.add('drag-over'); };
    slot.ondragleave = ()=> slot.classList.remove('drag-over');
    slot.ondrop = onSlotDrop;

    const k = document.createElement('div'); k.className = 'k'; k.textContent = `키 ${keys[i]}`;
    const name = document.createElement('div'); name.className = 'name'; name.textContent = payload?.name || '—';
    slot.append(k, name);

    if (payload) {
      const h = document.createElement('button'); h.className = 'btn btn-ghost'; h.textContent = 'Drag'; h.draggable = true;
      h.ondragstart = (e)=> { draggingSlotIndex = i; e.dataTransfer.setData('text/plain', i); };
      const u = document.createElement('button'); u.className = 'btn btn-ghost'; u.textContent = '해제';
      u.onclick = () => { state.miniSlots[i] = null; renderMiniGrid(); };
      slot.append(h, u);
    }
    miniGrid.appendChild(slot);
  });
}
let draggingSlotIndex = null;
function onSlotDrop(e){
  e.preventDefault(); this.classList.remove('drag-over');
  const to = parseInt(this.dataset.index, 10), from = draggingSlotIndex;
  if (from === null || from === to) return;
  [state.miniSlots[from], state.miniSlots[to]] = [state.miniSlots[to], state.miniSlots[from]];
  renderMiniGrid();
}

/** ========= 코어 로직 (이벤트, 라우팅, 정지) ========= **/
function hookClipEvents(clip){
  const { audioEl, ui } = clip;
  audioEl.onloadedmetadata = ()=> ui.durT.textContent = fmtTime(audioEl.duration);
  audioEl.onplay = ()=> { ui.badge.classList.add('playing'); updateNowPlaying(); ensureRAF(); };
  audioEl.onpause = ()=> { ui.badge.classList.remove('playing'); updateNowPlaying(); };
  audioEl.onended = ()=> { ui.badge.classList.remove('playing'); updateNowPlaying(); };
}

function routeClip(clip, route, badgeEl){
  try { clip.srcNode.disconnect(); } catch(e){}
  if (route==='main') clip.srcNode.connect(clip.gainNode).connect(mainMasterGain);
  else clip.srcNode.connect(clip.gainNode).connect(miniMasterGain);
  clip.route = route;
  badgeEl.textContent = (route==='mini'?'미니':'메인') + (clip.audioEl.paused?' 출력':' 출력 · 재생중');
}

function deleteClip(clip){
  clip.audioEl.pause();
  state.miniSlots = state.miniSlots.map(s => s?.clipId === clip.id ? null : s);
  state.clips = state.clips.filter(c => c.id !== clip.id);
  clip.ui.card.remove();
  renderMiniGrid(); updateNowPlaying();
}

function tick(){
  let any = false;
  state.clips.forEach(c => {
    const a = c.audioEl;
    if (!a.paused && !a.ended) {
      any = true;
      if (a.duration) {
        c.ui.seek.value = a.currentTime / a.duration;
        c.ui.curT.textContent = fmtTime(a.currentTime);
      }
    }
  });
  if (any) state.rafId = requestAnimationFrame(tick); else state.rafId = null;
}
function ensureRAF(){ if (!state.rafId) state.rafId = requestAnimationFrame(tick); }

function updateNowPlaying(){
  nowPlayingEl.innerHTML = '';
  const playing = state.clips.filter(c => !c.audioEl.paused && !c.audioEl.ended);
  if (!playing.length) { nowPlayingEl.innerHTML = '<div class="small">재생 중 없음</div>'; return; }
  playing.forEach(c => {
    const d = document.createElement('div'); d.className = 'np-item';
    d.innerHTML = `<span>${c.name}</span><span class="small">${c.route}</span>`;
    nowPlayingEl.appendChild(d);
  });
}

/** ========= 공유 및 초기화 ========= **/
masterVol.oninput = ()=> { mainMasterGain.gain.value = masterVol.value; masterVolVal.textContent = (+masterVol.value).toFixed(2); };
miniMasterVol.oninput = ()=> { miniMasterGain.gain.value = miniMasterVol.value; miniMasterVolVal.textContent = (+miniMasterVol.value).toFixed(2); };
document.getElementById('stopMain').onclick = ()=> state.clips.filter(c=>c.route==='main').forEach(c=>c.audioEl.pause());
document.getElementById('stopMini').onclick = ()=> state.clips.filter(c=>c.route==='mini').forEach(c=>c.audioEl.pause());

unlockBtn.onclick = async () => { 
  await audioCtx.resume(); 
  unlockBtn.textContent = '🔊 준비됨'; 
  unlockBtn.disabled = true; 
};

document.getElementById('makeCode').onclick = () => {
  const code = Math.random().toString(36).substring(2,8).toUpperCase();
  const peer = new Peer(code);
  state.peer = peer; state.code = code;
  document.getElementById('shareCode').textContent = code;
  peer.on('open', (id) => document.getElementById('peerStatus').textContent = '연결 대기 중...');
  peer.on('connection', (conn) => {
    state.connectedPeers.add(conn.peer);
    conn.on('open', () => {
      state.peer.call(conn.peer, shareDest.stream);
      document.getElementById('peerStatus').textContent = `접속: ${state.connectedPeers.size}명`;
    });
  });
};

renderMiniGrid();
</script>
</body>
</html>
